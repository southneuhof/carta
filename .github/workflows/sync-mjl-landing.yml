name: Sync MJL Landing

on:
  workflow_dispatch:

jobs:
  sync-mjl-landing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@southneuhof'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync MJL landing repository
        run: node scripts/sync-mjl-landing.mjs --target="$RUNNER_TEMP/mjl-landing" --push --validate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          MJL_LANDING_REMOTE: https://x-access-token:${{ secrets.MJL_LANDING_TOKEN }}@github.com/sallliisa/mjl-landing.git
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
          PUBLIC_RECAPTCHA_SITEKEY: ${{ secrets.PUBLIC_RECAPTCHA_SITEKEY }}
          RECAPTCHA_SECRETKEY: ${{ secrets.RECAPTCHA_SECRETKEY }}
          BYPASS_ALL_PERMISSIONS: ${{ secrets.BYPASS_ALL_PERMISSIONS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_BYPASS_ALL_PERMISSIONS: ${{ secrets.VITE_APP_BYPASS_ALL_PERMISSIONS }}
          VITE_APP_MODE: ${{ secrets.VITE_APP_MODE }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          BODY_SIZE_LIMIT: Infinity
