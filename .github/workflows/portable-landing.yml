name: Portable Landing Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  portable-landing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check portable landing guardrails
        run: node scripts/check-portable-landing.mjs
