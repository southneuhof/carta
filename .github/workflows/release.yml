name: Release and Sync MJL Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: release-and-sync-mjl-landing-main

jobs:
  release-and-sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@southneuhof'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure release changesets
        id: release
        run: node scripts/ensure-release-changesets.mjs
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}

      - name: Version packages
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm version-packages

      - name: Refresh source lockfile
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm install --lockfile-only
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Commit versioned source
        if: steps.release.outputs.has_release_intent == 'true'
        run: |
          if ! git diff --quiet; then
            git add package.json pnpm-lock.yaml .changeset packages apps
            git commit -m "chore: version packages [skip release]"
            git push origin HEAD:main
          else
            echo "No source version changes to commit."
          fi

      - name: Build publishable packages
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm release:build

      - name: Test publishable packages
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm release:test

      - name: Type check publishable packages
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm release:type-check

      - name: Verify package contents
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm release:verify

      - name: Publish packages
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm publish-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Wait for published packages
        if: steps.release.outputs.has_release_intent == 'true'
        run: node scripts/wait-for-published-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Sync package repositories
        if: steps.release.outputs.has_release_intent == 'true'
        run: pnpm sync:package-repos
        env:
          GITHUB_TOKEN_FOR_PACKAGE_REPOS: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Sync and validate MJL landing repository
        run: node scripts/sync-mjl-landing.mjs --target="$RUNNER_TEMP/mjl-landing" --push --validate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          MJL_LANDING_REMOTE: https://x-access-token:${{ secrets.MJL_LANDING_TOKEN }}@github.com/sallliisa/mjl-landing.git
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
          PUBLIC_RECAPTCHA_SITEKEY: ${{ secrets.PUBLIC_RECAPTCHA_SITEKEY }}
          RECAPTCHA_SECRETKEY: ${{ secrets.RECAPTCHA_SECRETKEY }}
          BYPASS_ALL_PERMISSIONS: ${{ secrets.BYPASS_ALL_PERMISSIONS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_BYPASS_ALL_PERMISSIONS: ${{ secrets.VITE_APP_BYPASS_ALL_PERMISSIONS }}
          VITE_APP_MODE: ${{ secrets.VITE_APP_MODE }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          BODY_SIZE_LIMIT: Infinity
