name: Sync Package Branches

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/sync-package-branches.yml'
  workflow_dispatch:

concurrency:
  group: sync-package-branches-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.8.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure package repo auth
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          set -eu
          test -n "${GH_PACKAGES_TOKEN}"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global url."https://x-access-token:${GH_PACKAGES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Push package branches
        run: pnpm packages:push
